<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Friday Evening?</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    font-family: Arial, sans-serif;
    background: #f5eee6;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
  }

  .box {
    width: 90%;
    max-width: 430px;
    min-height: 560px;
    background: white;
    padding: 30px 20px;
    border-radius: 25px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  }

  h2 {
    font-size: 24px;
    margin-bottom: 35px;
  }

  .area {
    position: relative;
    height: 260px;
  }

  button {
    position: absolute;
    padding: 14px 30px;
    border: none;
    border-radius: 25px;
    font-size: 18px;
    cursor: pointer;
    transition: left 0.25s, top 0.25s, transform 0.2s;
  }

  #yes {
    left: 45px;
    top: 50px;
    background: #2bb673;
    color: white;
    z-index: 2;
  }

  #no {
    right: 45px;
    top: 50px;
    background: #eeeeee;
    color: #555;
    z-index: 1;
  }

  #message {
    min-height: 60px;
    font-size: 17px;
    color: #555;
    margin-top: 15px;
  }

  #final {
    display: none;
    margin-top: 40px;
  }

  .great {
    font-size: 24px;
    color: #2bb673;
    font-weight: bold;
    margin-bottom: 25px;
  }

  .ask {
    font-size: 20px;
    color: #444;
    margin-bottom: 25px;
  }

  .timeBtn {
    position: static;
    display: block;
    width: 230px;
    margin: 12px auto;
    background: #2bb673;
    color: white;
  }

  #timeResult {
    margin-top: 25px;
    font-size: 20px;
    color: #2bb673;
    font-weight: bold;
  }
</style>
</head>

<body>

<div class="box">
  <h2 id="question">
    Would you be up for making Friday evening a little more fun together?
  </h2>

  <div class="area" id="area">
    <button id="yes">Yes 😊</button>
    <button id="no">No</button>
  </div>

  <div id="message"></div>

  <div id="final"></div>
</div>

<script>
  const no = document.getElementById("no");
  const yes = document.getElementById("yes");
  const area = document.getElementById("area");
  const message = document.getElementById("message");
  const final = document.getElementById("final");
  const question = document.getElementById("question");

  const messages = [
    "That could make Ruslan unhappy, so choose again.",
    "This may upset Ruslan, so choose again.",
    "It may disappoint Ruslan, so choose again.",
    "Ruslan might not be happy with that, so choose again.",
    "If you choose that, it could make Ruslan unhappy, so choose again.",
    "That choice might upset Ruslan, so choose again.",
    "It could make Ruslan unhappy, so you may want to choose again."
  ];

  let attempts = 0;

  function overlapsYes(left, top) {
    const noWidth = no.offsetWidth;
    const noHeight = no.offsetHeight;

    const yesLeft = yes.offsetLeft - 15;
    const yesTop = yes.offsetTop - 15;
    const yesRight = yes.offsetLeft + yes.offsetWidth + 15;
    const yesBottom = yes.offsetTop + yes.offsetHeight + 15;

    const noRight = left + noWidth;
    const noBottom = top + noHeight;

    return !(
      noRight < yesLeft ||
      left > yesRight ||
      noBottom < yesTop ||
      top > yesBottom
    );
  }

  function moveNoButton() {
    const maxX = area.clientWidth - no.offsetWidth;
    const maxY = area.clientHeight - no.offsetHeight;

    let newLeft;
    let newTop;
    let safe = false;

    for (let i = 0; i < 60; i++) {
      newLeft = Math.random() * maxX;
      newTop = Math.random() * maxY;

      if (!overlapsYes(newLeft, newTop)) {
        safe = true;
        break;
      }
    }

    if (!safe) {
      newLeft = maxX;
      newTop = maxY;
    }

    no.style.left = newLeft + "px";
    no.style.top = newTop + "px";
    no.style.right = "auto";

    message.textContent =
      messages[Math.floor(Math.random() * messages.length)];

    attempts++;
    yes.style.transform =
      "scale(" + Math.min(1 + attempts * 0.04, 1.3) + ")";
  }

  no.addEventListener("click", moveNoButton);

  yes.addEventListener("click", function () {

    question.style.display = "none";
    area.style.display = "none";
    message.style.display = "none";

    final.innerHTML = `
        <div style="font-size:40px;">🥳</div>

        <div class="great">
            Great! I'm excited to see you then 😊
        </div>

        <div style="
            margin-top:35px;
            font-size:22px;
            color:#444;
            line-height:1.5;
        ">
            What time should I pick you up?
        </div>

        <div style="
            margin-top:12px;
            color:#888;
            font-size:15px;
            font-style:italic;
        ">
            Just let me know 😊
        </div>
    `;

    final.style.display = "block";
});
</script>

</body>
</html>
